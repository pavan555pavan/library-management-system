<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Returned</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Times New Roman", Times, serif;
}

body{

    background:#EEF4FB;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;

}

/* ================= SUCCESS BOX ================= */

.box{

    width:520px;
    background:white;
    padding:45px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,.18);
    transition:.4s;

}

.box:hover{

    transform:translateY(-6px);
    box-shadow:0 20px 40px rgba(0,0,0,.25);

}

/* ================= SUCCESS ICON ================= */

.success-icon{

    font-size:70px;
    color:#10B981;
    margin-bottom:20px;

}

/* ================= TITLE ================= */

h1{

    color:#059669;
    font-size:38px;
    margin-bottom:18px;

}

/* ================= MESSAGE ================= */

p{

    font-size:20px;
    color:#4B5563;
    line-height:32px;

}

/* ================= BUTTON ================= */

a{

    display:inline-block;
    margin-top:30px;
    padding:14px 35px;
    text-decoration:none;
    background:linear-gradient(135deg,#2563EB,#1E3A8A);
    color:white;
    border-radius:35px;
    font-size:18px;
    font-weight:bold;
    transition:.35s;
    box-shadow:0 8px 18px rgba(37,99,235,.35);

}

a:hover{

    background:linear-gradient(135deg,#1D4ED8,#1E40AF);
    transform:translateY(-3px);
    box-shadow:0 12px 24px rgba(37,99,235,.50);

}

/* ================= RESPONSIVE ================= */

@media(max-width:600px){

.box{

    width:90%;
    padding:30px;

}

.success-icon{

    font-size:55px;

}

h1{

    font-size:30px;

}

p{

    font-size:18px;

}

}
</style>

</head>

<body>

<div class="box">

<h1>✅ Book Returned Successfully!</h1>

<p>The book has been returned successfully.</p>

<a href="/user-dashboard">

⬅ Back to Dashboard

</a>

</div>

</body>
</html>
