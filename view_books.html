<!DOCTYPE html>
<html>

<head>

<title>Available Books</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

<link rel="stylesheet" href="{{ url_for('static', filename='css/view_books.css') }}">
<style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Times New Roman", Times, serif;
}

body{
    background:#EEF4FB;
}

/* ================= HEADER ================= */

header{

    background:linear-gradient(135deg,#1E3A8A,#2563EB);
    color:white;
    text-align:center;
    padding:28px;
    box-shadow:0 5px 15px rgba(0,0,0,.25);

}

header h1{

    font-size:40px;
    letter-spacing:2px;

}

/* ================= CONTAINER ================= */

.container{

    width:95%;
    margin:35px auto;

}

/* ================= TABLE ================= */

table{

    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,.15);

}

/* Table Header */

table th{

    background:linear-gradient(135deg,#1E3A8A,#2563EB);
    color:white;
    padding:16px;
    font-size:20px;
    letter-spacing:1px;

}

/* Table Data */

table td{

    text-align:center;
    padding:15px;
    font-size:18px;
    border-bottom:1px solid #E5E7EB;

}

/* Alternate Rows */

table tr:nth-child(even){

    background:#F8FAFC;

}

/* Hover Effect */

table tr:hover{

    background:#DBEAFE;
    transition:.3s;

}



/* ================= BACK BUTTON ================= */

.back{

    margin-top:30px;
    text-align:center;

}

.back a{

    display:inline-block;
    text-decoration:none;
    background:linear-gradient(135deg,#10B981,#059669);
    color:white;
    padding:13px 28px;
    border-radius:30px;
    font-size:18px;
    font-weight:bold;
    transition:.3s;

}

.back a:hover{

    background:linear-gradient(135deg,#059669,#047857);
    transform:translateY(-3px);

}

/* ================= FOOTER ================= */

footer{

    margin-top:45px;
    background:#1E3A8A;
    color:white;
    text-align:center;
    padding:18px;
    font-size:18px;

}
</style>
</head>

<body>

<header>

<h1><i class="fa-solid fa-book-open"></i> Available Books</h1>

</header>

<div class="container">

<table>

<tr>

<th>ID</th>
<th>Title</th>
<th>Author</th>
<th>Category</th>
<th>Total</th>
<th>Available</th>

</tr>

{% for book in books %}

<tr>

<td>{{ book[0] }}</td>
<td>{{ book[1] }}</td>
<td>{{ book[2] }}</td>
<td>{{ book[3] }}</td>
<td>{{ book[4] }}</td>
<td>{{ book[5] }}</td>

</tr>

{% endfor %}

</table>

<div class="back">

<a href="/user-dashboard">

<i class="fa-solid fa-arrow-left"></i>

Back to Dashboard

</a>

</div>

</div>

</body>

</html>
